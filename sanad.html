<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سند | مصرف الإنماء</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  /* ---------------------------------------------------------
     Tailwind theme — Sanad brand tokens (deep blue + warm brown)
  --------------------------------------------------------- */
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          sanad: {
            blue:        '#0E3A5F',
            blueDark:    '#082943',
            blueLight:   '#1C5680',
            blueSoft:    '#D9E6EF',
            brown:       '#A9763E',
            brownDark:   '#7C5526',
            brownLight:  '#C9A77C',
            brownSoft:   '#F2E7D6',
            cream:       '#FAF6EF',
            ink:         '#16324A',
            inkSoft:     '#5B7184',
            success:     '#3F7D54',
            successSoft: '#E4EFE6',
            successDark: '#2C5A3D'
          }
        },
        fontFamily: {
          heading: ['Cairo', 'sans-serif'],
          body: ['Tajawal', 'sans-serif']
        }
      }
    }
  };
</script>
<style>
  body { font-family: 'Tajawal', sans-serif; }
  .font-heading { font-family: 'Cairo', sans-serif; }
  * { box-sizing: border-box; }

  /* ---------- mic ripple rings ---------- */
  .mic-ring {
    position: absolute;
    inset: 0;
    border-radius: 9999px;
    border: 2px solid #1C5680;
    opacity: 0;
    transform: scale(0.7);
    pointer-events: none;
  }
  .is-active .mic-ring { animation: ringPulse 1.6s ease-out infinite; }
  .is-active .mic-ring.r2 { animation-delay: .5s; }
  .is-active .mic-ring.r3 { animation-delay: 1s; }
  @keyframes ringPulse {
    0%   { opacity: .5; transform: scale(.7); }
    100% { opacity: 0;  transform: scale(1.6); }
  }

  .breathe { animation: breathe 3s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }

  /* ---------- waveform bars (listening) ---------- */
  .eq-bar { width: 4px; border-radius: 3px; background: #FFFFFF; animation: eqBar 0.9s ease-in-out infinite; }
  @keyframes eqBar { 0%, 100% { height: 8px; } 50% { height: 24px; } }

  /* ---------- typing dots (processing) ---------- */
  .typing-dot { width: 8px; height: 8px; border-radius: 9999px; background: #FFFFFF; animation: dotBounce 1.1s ease-in-out infinite; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: .5; }
    40%           { transform: translateY(-6px); opacity: 1; }
  }

  .fade-up { animation: fadeUp .4s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .pop { animation: pop .35s cubic-bezier(.2,.85,.3,1.2) forwards; }
  @keyframes pop { from { opacity: 0; transform: scale(.92); } to { opacity: 1; transform: scale(1); } }

  .scrollarea { scrollbar-width: none; }
  .scrollarea::-webkit-scrollbar { display: none; }

  .focus-ring:focus-visible { outline: 3px solid #1C5680; outline-offset: 3px; }
</style>
</head>
<body class="bg-[#EFE6D6] min-h-screen flex items-center justify-center p-4 sm:p-8">

<div id="phone" class="relative w-full max-w-[400px] h-[min(820px,93vh)] bg-sanad-cream rounded-[2.5rem] shadow-[0_30px_70px_-20px_rgba(14,58,95,0.45)] border-[6px] border-sanad-blueDark overflow-hidden flex flex-col text-right" dir="rtl">

  <!-- ================= STATUS BAR ================= -->
  <div class="flex items-center justify-between px-6 pt-3 pb-1 shrink-0 font-heading" dir="ltr">
    <div class="flex items-center gap-1.5">
      <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><path d="M1 9.5L1 7C3 4 13 4 15 7V9.5" stroke="#16324A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><rect x="1" y="6" width="2.4" height="4" rx="0.5" fill="#16324A"/><rect x="5" y="4" width="2.4" height="6" rx="0.5" fill="#16324A"/><rect x="9" y="2" width="2.4" height="8" rx="0.5" fill="#16324A"/><rect x="13" y="0.5" width="2.4" height="9.5" rx="0.5" fill="#C9A77C"/></svg>
      <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="0.75" y="0.75" width="18.5" height="9.5" rx="2.25" stroke="#16324A" stroke-width="1"/><rect x="2" y="2" width="15.5" height="7" rx="1.2" fill="#16324A"/><rect x="20" y="3.3" width="1.3" height="4.4" rx="0.6" fill="#16324A"/></svg>
    </div>
    <span class="text-[13px] font-bold text-sanad-ink">9:41</span>
  </div>

  <!-- ================= APP HEADER ================= -->
  <div class="px-6 pt-3 pb-4 shrink-0 bg-sanad-cream">
    <div class="flex items-center justify-between mb-4">
      <div class="w-11 h-11 rounded-full bg-sanad-brownSoft border-2 border-sanad-brownLight flex items-center justify-center shrink-0">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.6" stroke="#7C5526" stroke-width="1.6"/><path d="M5 20c1.2-3.8 4.2-5.6 7-5.6s5.8 1.8 7 5.6" stroke="#7C5526" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <div class="flex items-center gap-2.5">
        <div>
          <p class="font-heading font-extrabold text-sanad-blue text-lg leading-tight">سَنَد</p>
          <p class="text-[12px] text-sanad-inkSoft leading-tight">مصرف الإنماء</p>
        </div>
        <div class="w-11 h-11 rounded-2xl bg-sanad-blue flex items-center justify-center shrink-0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3L4 7v6c0 4.4 3.2 8.2 8 9 4.8-.8 8-4.6 8-9V7l-8-4z" stroke="#F2E7D6" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 12.2l2 2.2 4-4.6" stroke="#F2E7D6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>
    <p class="font-heading font-bold text-sanad-ink text-xl leading-snug">مساء الخير، أبا سعيد</p>
    <p class="text-sanad-inkSoft text-[15px] leading-snug mt-1">سند جاهز يساعدك اليوم</p>
  </div>

  <!-- ================= BALANCE CARD ================= -->
  <div class="px-6 shrink-0">
    <div class="rounded-[20px] bg-sanad-blue px-5 py-5">
      <div class="flex items-center justify-between mb-3">
        <p class="text-sanad-blueSoft text-[13px] leading-none">الرصيد الحالي</p>
        <div class="w-10 h-10 rounded-xl bg-sanad-brown flex items-center justify-center shrink-0">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="5.5" width="19" height="13" rx="2.5" stroke="#FAF6EF" stroke-width="1.6"/><path d="M2.5 9.5h19" stroke="#FAF6EF" stroke-width="1.6"/></svg>
        </div>
      </div>
      <p class="font-heading font-extrabold text-white text-[30px] leading-tight">
        <bdi>١٢٬٤٨٠ <span class="text-base font-bold">ريال</span></bdi>
      </p>
      <p class="text-sanad-blueSoft text-[13px] leading-snug mt-2"><bdi>حساب ****٤٨٢١ — محدّث الآن</bdi></p>
    </div>
  </div>

  <!-- ================= CONVERSATION AREA ================= -->
  <div id="conversation" class="scrollarea flex-1 overflow-y-auto px-6 pt-5 pb-2 flex flex-col gap-3">
    <div id="emptyHint" class="flex-1 flex flex-col items-center justify-center text-center px-4 gap-3">
      <div class="w-14 h-14 rounded-full bg-sanad-brownSoft flex items-center justify-center">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 21c4.5-1.2 7.5-5 7.5-9V6.5L12 3 4.5 6.5V12c0 4 3 7.8 7.5 9z" stroke="#A9763E" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 12l2 2 4-4.2" stroke="#A9763E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <p class="text-sanad-inkSoft text-[15px] leading-relaxed max-w-[230px]">اضغط على زر الميكروفون لتجربة سند: استعلام عن الرصيد، تحويل مبلغ، أو سداد فاتورة</p>
    </div>
  </div>

  <!-- ================= MIC DOCK ================= -->
  <div class="shrink-0 px-6 pt-2 pb-4 bg-sanad-cream">
    <div class="flex flex-col items-center">
      <div id="micWrap" class="relative w-[116px] h-[116px] flex items-center justify-center mb-2">
        <span class="mic-ring r1"></span>
        <span class="mic-ring r2"></span>
        <span class="mic-ring r3"></span>
        <button id="micBtn"
          class="focus-ring breathe relative z-10 w-[92px] h-[92px] rounded-full bg-sanad-brown flex items-center justify-center transition-colors duration-300 shadow-[0_10px_24px_-8px_rgba(124,85,38,0.55)]"
          aria-label="اضغط للتحدث مع سند">
          <span id="micVisual" class="flex items-center justify-center">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" stroke="#FFFFFF" stroke-width="1.8"/><path d="M5 11a7 7 0 0 0 14 0" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/><path d="M12 18v3" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/></svg>
          </span>
        </button>
      </div>
      <p id="statusLabel" class="font-heading font-bold text-sanad-ink text-[17px] text-center min-h-[24px]" aria-live="polite">اضغط للتحدث مع سند</p>
    </div>
  </div>

  <!-- ================= BOTTOM NAV ================= -->
  <div class="shrink-0 bg-white border-t border-sanad-brownLight/40 px-2 pt-2 pb-3">
    <div class="grid grid-cols-4">
      <button class="focus-ring flex flex-col items-center gap-1 py-1 text-sanad-blue">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 11l9-7 9 7" stroke="#0E3A5F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9" stroke="#0E3A5F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="text-[12px] font-bold">الرئيسية</span>
      </button>
      <button class="focus-ring flex flex-col items-center gap-1 py-1 text-sanad-inkSoft">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="5.5" width="19" height="13" rx="2.5" stroke="#5B7184" stroke-width="1.6"/><path d="M2.5 9.5h19" stroke="#5B7184" stroke-width="1.6"/></svg>
        <span class="text-[12px] font-bold">حساباتي</span>
      </button>
      <button class="focus-ring flex flex-col items-center gap-1 py-1 text-sanad-inkSoft">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" stroke="#5B7184" stroke-width="1.6"/><path d="M5 11a7 7 0 0 0 14 0" stroke="#5B7184" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span class="text-[12px] font-bold">سند</span>
      </button>
      <button class="focus-ring flex flex-col items-center gap-1 py-1 text-sanad-inkSoft">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.6" fill="#5B7184"/><circle cx="12" cy="12" r="1.6" fill="#5B7184"/><circle cx="19" cy="12" r="1.6" fill="#5B7184"/></svg>
        <span class="text-[12px] font-bold">المزيد</span>
      </button>
    </div>
  </div>

</div>

<script>
(function () {
  "use strict";

  /* ---------------------------------------------------------
     DOM references
  --------------------------------------------------------- */
  var micBtn       = document.getElementById('micBtn');
  var micWrap       = document.getElementById('micWrap');
  var micVisual     = document.getElementById('micVisual');
  var statusLabel   = document.getElementById('statusLabel');
  var conversation  = document.getElementById('conversation');

  /* ---------------------------------------------------------
     Mic icon templates (single source of truth, no overlap)
  --------------------------------------------------------- */
  var ICON_MIC = '<svg width="34" height="34" viewBox="0 0 24 24" fill="none">' +
    '<rect x="9" y="2" width="6" height="12" rx="3" stroke="#FFFFFF" stroke-width="1.8"/>' +
    '<path d="M5 11a7 7 0 0 0 14 0" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>' +
    '<path d="M12 18v3" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/></svg>';

  function buildEqualizer() {
    var wrap = document.createElement('span');
    wrap.className = 'flex items-end gap-[3px] h-6';
    for (var i = 0; i < 5; i++) {
      var bar = document.createElement('span');
      bar.className = 'eq-bar';
      bar.style.animationDelay = (i * 0.12) + 's';
      wrap.appendChild(bar);
    }
    return wrap;
  }

  function buildTypingDots() {
    var wrap = document.createElement('span');
    wrap.className = 'flex items-center gap-1.5';
    for (var i = 0; i < 3; i++) {
      var dot = document.createElement('span');
      dot.className = 'typing-dot';
      dot.style.animationDelay = (i * 0.15) + 's';
      wrap.appendChild(dot);
    }
    return wrap;
  }

  /* ---------------------------------------------------------
     Mic button visual state machine
     idle       -> brown circle, static mic icon
     listening  -> blue circle, ripple rings, equalizer bars
     processing -> blue circle (no rings), bouncing dots
  --------------------------------------------------------- */
  function setMicState(mode) {
    micVisual.innerHTML = '';
    micWrap.classList.remove('is-active');
    micBtn.classList.remove('breathe', 'bg-sanad-brown', 'bg-sanad-blue');

    if (mode === 'idle') {
      micBtn.classList.add('bg-sanad-brown', 'breathe');
      micVisual.innerHTML = ICON_MIC;
      micBtn.setAttribute('aria-label', 'اضغط للتحدث مع سند');
    } else if (mode === 'listening') {
      micBtn.classList.add('bg-sanad-blue');
      micWrap.classList.add('is-active');
      micVisual.appendChild(buildEqualizer());
      micBtn.setAttribute('aria-label', 'سند يستمع إليك الآن');
    } else if (mode === 'processing') {
      micBtn.classList.add('bg-sanad-blue');
      micVisual.appendChild(buildTypingDots());
      micBtn.setAttribute('aria-label', 'سند يعالج طلبك');
    }
  }

  /* ---------------------------------------------------------
     The three rotating scenarios
  --------------------------------------------------------- */
  var scenarios = [
    {
      label: 'استعلام الرصيد',
      processingText: 'سند جاري استعلام الرصيد...',
      replyText: 'تفضّل يا أبا سعيد، رصيد حسابك الحالي هو اثنا عشر ألفًا وأربعمائة وثمانون ريالًا.',
      renderCard: function () {
        return (
          '<div class="bg-white border-2 border-sanad-blueSoft rounded-2xl px-5 py-4">' +
            '<div class="flex items-center justify-between mb-3">' +
              '<p class="text-sanad-inkSoft text-[13px]">الرصيد الحالي</p>' +
              '<div class="w-9 h-9 rounded-xl bg-sanad-blueSoft flex items-center justify-center shrink-0">' +
                '<svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="5.5" width="19" height="13" rx="2.5" stroke="#0E3A5F" stroke-width="1.7"/><path d="M2.5 9.5h19" stroke="#0E3A5F" stroke-width="1.7"/></svg>' +
              '</div>' +
            '</div>' +
            '<p class="font-heading font-extrabold text-sanad-blue text-[28px] leading-tight"><bdi>١٢٬٤٨٠ <span class="text-base">ريال</span></bdi></p>' +
            '<p class="text-sanad-inkSoft text-[13px] mt-2"><bdi>الحساب الجاري ****٤٨٢١</bdi></p>' +
          '</div>'
        );
      }
    },
    {
      label: 'تحويل مبلغ',
      processingText: 'سند جاري تحويل المبلغ...',
      replyText: 'تم تحويل مبلغ خمسمائة ريال إلى أحمد الصرفية بنجاح.',
      renderCard: function () {
        return (
          '<div class="bg-white border-2 border-sanad-successSoft rounded-2xl px-5 py-4">' +
            '<div class="flex items-center gap-2.5 mb-3">' +
              '<div class="w-9 h-9 rounded-full bg-sanad-successSoft flex items-center justify-center shrink-0">' +
                '<svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="#2C5A3D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
              '</div>' +
              '<p class="font-heading font-bold text-sanad-success text-[16px]">تم التحويل بنجاح</p>' +
            '</div>' +
            '<div class="flex items-center justify-between border-t border-sanad-successSoft pt-3">' +
              '<p class="text-sanad-inkSoft text-[13px]">المستلم</p>' +
              '<p class="text-sanad-ink text-[14px] font-bold"><bdi>أحمد الصرفية</bdi></p>' +
            '</div>' +
            '<div class="flex items-center justify-between mt-2">' +
              '<p class="text-sanad-inkSoft text-[13px]">المبلغ</p>' +
              '<p class="font-heading font-extrabold text-sanad-success text-[18px]"><bdi>٥٠٠ ريال</bdi></p>' +
            '</div>' +
            '<p class="text-sanad-inkSoft text-[12px] mt-3"><bdi>رقم العملية: ٧٧٨٤٢١٣٩ — اليوم ٩:٤١ م</bdi></p>' +
          '</div>'
        );
      }
    },
    {
      label: 'سداد فاتورة',
      processingText: 'سند جاري سداد الفاتورة...',
      replyText: 'تم سداد فاتورة الإنترنت الخاصة بك بقيمة ثلاثمائة ريال.',
      renderCard: function () {
        return (
          '<div class="bg-white border-2 border-sanad-successSoft rounded-2xl px-5 py-4">' +
            '<div class="flex items-center gap-2.5 mb-3">' +
              '<div class="w-9 h-9 rounded-full bg-sanad-successSoft flex items-center justify-center shrink-0">' +
                '<svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="#2C5A3D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
              '</div>' +
              '<p class="font-heading font-bold text-sanad-success text-[16px]">تم السداد بنجاح</p>' +
            '</div>' +
            '<div class="flex items-center justify-between border-t border-sanad-successSoft pt-3">' +
              '<p class="text-sanad-inkSoft text-[13px]">الفاتورة</p>' +
              '<p class="text-sanad-ink text-[14px] font-bold"><bdi>فاتورة الإنترنت</bdi></p>' +
            '</div>' +
            '<div class="flex items-center justify-between mt-2">' +
              '<p class="text-sanad-inkSoft text-[13px]">المبلغ</p>' +
              '<p class="font-heading font-extrabold text-sanad-success text-[18px]"><bdi>٣٠٠ ريال</bdi></p>' +
            '</div>' +
            '<p class="text-sanad-inkSoft text-[12px] mt-3"><bdi>رقم العملية: ٤٤١٠٩٩٢٧ — اليوم ٩:٤١ م</bdi></p>' +
          '</div>'
        );
      }
    }
  ];

  var scenarioIndex = 0;
  var isBusy = false;

  /* ---------------------------------------------------------
     Conversation builders
  --------------------------------------------------------- */
  function clearConversation() {
    conversation.innerHTML = '';
  }

  function addLabelPill(text) {
    var el = document.createElement('div');
    el.className = 'fade-up self-start bg-sanad-brownSoft text-sanad-brownDark text-[12px] font-bold px-3 py-1.5 rounded-full';
    el.textContent = text;
    conversation.appendChild(el);
  }

  function addProcessingLine(text) {
    var el = document.createElement('div');
    el.className = 'fade-up flex items-center gap-2 text-sanad-inkSoft text-[14px]';
    el.innerHTML =
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="shrink-0"><path d="M12 21c4.5-1.2 7.5-5 7.5-9V6.5L12 3 4.5 6.5V12c0 4 3 7.8 7.5 9z" stroke="#A9763E" stroke-width="1.8" stroke-linejoin="round"/></svg>' +
      '<span><bdi>' + text + '</bdi></span>';
    conversation.appendChild(el);
    conversation.scrollTop = conversation.scrollHeight;
  }

  function addReplyAndCard(scenario) {
    var wrap = document.createElement('div');
    wrap.className = 'pop flex flex-col gap-3';
    wrap.innerHTML =
      '<p class="text-sanad-ink text-[15px] leading-relaxed"><bdi>' + scenario.replyText + '</bdi></p>' +
      scenario.renderCard();
    conversation.appendChild(wrap);
    conversation.scrollTop = conversation.scrollHeight;
  }

  /* ---------------------------------------------------------
     Main interaction flow
  --------------------------------------------------------- */
  function handleMicPress() {
    if (isBusy) return;
    isBusy = true;

    var scenario = scenarios[scenarioIndex];
    clearConversation();
    addLabelPill(scenario.label);

    setMicState('listening');
    statusLabel.textContent = 'أستمع إليك...';

    setTimeout(function () {
      setMicState('processing');
      statusLabel.textContent = 'سند يعالج طلبك...';
      addProcessingLine(scenario.processingText);

      setTimeout(function () {
        addReplyAndCard(scenario);
        setMicState('idle');
        statusLabel.textContent = 'اضغط لتجربة طلب آخر';
        scenarioIndex = (scenarioIndex + 1) % scenarios.length;
        isBusy = false;
      }, 1500);

    }, 1300);
  }

  micBtn.addEventListener('click', handleMicPress);
  setMicState('idle');
})();
</script>

</body>
</html>
